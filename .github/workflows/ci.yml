name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned via rust-toolchain.toml (1.96.0); ensure rustfmt + clippy exist.
      - name: Install Rust 1.96.0 (rustfmt, clippy)
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustc --version
          cargo --version

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Unit tests are DB-free (domain logic with fakes + RS256 round-trip).
      # DB-backed tests are gated behind TEST_DATABASE_URL and run in the
      # `integration` job below.
      - name: Test
        run: cargo test --workspace

  integration:
    name: integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: digicore
          POSTGRES_PASSWORD: digicore
          POSTGRES_DB: digicore
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U digicore"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96.0
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustc --version

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Runs the whole suite with TEST_DATABASE_URL set, so the DB-gated tests
      # (e.g. reporting-svc sales-projection idempotency) execute against a real
      # Postgres; DB-free tests simply re-run.
      - name: Test (with database)
        env:
          TEST_DATABASE_URL: postgres://digicore:digicore@localhost:5432/digicore
        run: cargo test --workspace

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    # cargo-deny only analyses the dependency graph (it never builds our code),
    # so pin it to stable cargo — manifest parsing then always understands the
    # latest edition regardless of rust-toolchain.toml. RUSTUP_TOOLCHAIN overrides it.
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      # Scans the dependency graph for RustSec advisories, banned/wildcard deps,
      # and untrusted sources (deny.toml). Licenses are checked separately once
      # an allow-list is curated. `arguments: ""` overrides the default
      # `--all-features` so we analyse the graph as the project actually builds.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
          arguments: ""

  vertical-trade-export:
    name: vertical (trade-export)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96.0 (rustfmt, clippy)
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustc --version

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            verticals/trade-export-svc/target
          key: ${{ runner.os }}-vertical-trade-export-${{ hashFiles('verticals/trade-export-svc/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vertical-trade-export-

      # The vertical is a standalone workspace (verticals/README.md), built via
      # --manifest-path. Same gates as the core `check` job.
      - name: Format check
        run: cargo fmt --manifest-path verticals/trade-export-svc/Cargo.toml --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path verticals/trade-export-svc/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path verticals/trade-export-svc/Cargo.toml

  vertical-retail:
    name: vertical (retail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96.0 (rustfmt, clippy)
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustc --version

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            verticals/retail-svc/target
          key: ${{ runner.os }}-vertical-retail-${{ hashFiles('verticals/retail-svc/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vertical-retail-

      - name: Format check
        run: cargo fmt --manifest-path verticals/retail-svc/Cargo.toml --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path verticals/retail-svc/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path verticals/retail-svc/Cargo.toml

  openapi-contract:
    name: openapi contract (routes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Every /api/v1 route a service actually serves must be in docs/openapi.yaml
      # (served ⊆ documented). Pure stdlib; no install needed.
      - name: Served routes are documented
        run: python3 scripts/check_openapi_routes.py

  openapi-client:
    name: openapi client (typescript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # The committed src/schema.d.ts must match what docs/openapi.yaml produces;
      # npm ci pins the exact generator version, so this diff is deterministic.
      - name: Verify generated client is in sync with docs/openapi.yaml
        run: |
          npm run generate
          git diff --exit-code -- src/schema.d.ts \
            || { echo "::error::src/schema.d.ts is stale — run 'npm run generate' in clients/typescript and commit it."; exit 1; }
