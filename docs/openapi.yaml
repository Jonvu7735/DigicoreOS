# DigicoreOS — OpenAPI v1 (the "OpenAPI/spec riêng" referenced in API-GATEWAY.md §1).
#
# API-GATEWAY.md is the source of truth for the URL/method/domain surface; this
# file adds the machine-readable schema detail it defers, for frontend (Next.js),
# external clients, and the AI agent's client/handler generation. Keep the two in
# sync: any route added to API-GATEWAY.md should appear here and vice versa.
#
# Conventions (API-GATEWAY.md §2): every path is /api/v1/<domain>/...; most calls
# require `Authorization: Bearer <JWT>` (RS256, verified per service); tenant is
# taken from the JWT or an explicit `X-Tenant-Id` header. Every service also
# exposes unauthenticated `GET /api/v1/<domain>/health` and `/ready` probes
# (omitted below — they are infra, not part of the business contract). Edge rate
# limiting (SECURITY.md §5.2) can return 429 on any route; login/refresh are
# throttled hardest.
openapi: 3.1.0
info:
  title: DigicoreOS Platform API
  version: 1.0.0
  description: |
    Public HTTP contract for the AI-first Rust SaaS platform — six bounded
    contexts (Auth, ERP, CRM, HRM, Reporting, AI) fronted by a single edge under
    `/api/v1/`. Monetary amounts are integers in the currency's minor units
    (e.g. cents) paired with an ISO-4217 `currency`. Identifiers are UUIDs;
    timestamps are RFC 3339. List endpoints accept `page`/`page_size` and return a
    paginated envelope.
  license:
    name: Proprietary
servers:
  - url: https://api.digicore.example.com
    description: Production edge (replace host to match deploy/k8s/50-ingress.yaml)
  - url: http://localhost:8080
    description: Local development (per-service ports 8081-8086 when not behind the edge)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Identity, users, tenants (auth-svc, /api/v1/auth)
  - name: ERP
    description: Orders, payments, inventory, products, invoices (core-erp-svc, /api/v1/erp)
  - name: CRM
    description: Customers, deals, activities (crm-svc, /api/v1/crm)
  - name: HRM
    description: Employees, attendance, leaves (hrm-svc, /api/v1/hrm)
  - name: Reporting
    description: Dashboards, summaries, exports (reporting-svc, /api/v1/reporting)
  - name: AI
    description: Query, insight, assistant, model management (ai-svc, /api/v1/ai)
  - name: TradeExport
    description: Export shipments — first vertical (trade-export-svc, /api/v1/trade-export)

paths:
  # ───────────────────────────── Auth ─────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in, returning an access/refresh token pair
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access token
      operationId: authRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out, revoking the current refresh token
      operationId: authLogout
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '204': { description: Logged out }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user (from the JWT)
      operationId: authMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/users:
    get:
      tags: [Auth]
      summary: List users in the tenant
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: A page of users
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Auth]
      summary: Create a user (admin)
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/User' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Auth]
      summary: Get a user
      operationId: getUser
      responses:
        '200':
          description: The user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Auth]
      summary: Partially update a user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/User' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Auth]
      summary: Deactivate or delete a user (per policy)
      operationId: deleteUser
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/tenants:
    get:
      tags: [Auth]
      summary: List tenants (system/super-admin)
      operationId: listTenants
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of tenants
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Auth]
      summary: Create a tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Tenant' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/auth/tenants/{tenant_id}:
    parameters:
      - $ref: '#/components/parameters/TenantPathId'
    get:
      tags: [Auth]
      summary: Get a tenant
      operationId: getTenant
      responses:
        '200':
          description: The tenant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Auth]
      summary: Update a tenant (plan, status, ...)
      operationId: updateTenant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Tenant' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }

  # ───────────────────────────── ERP ─────────────────────────────
  /api/v1/erp/orders:
    get:
      tags: [ERP]
      summary: List orders
      operationId: listOrders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - name: customer_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of orders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [ERP]
      summary: Create an order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Order' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/orders/{order_id}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [ERP]
      summary: Get an order
      operationId: getOrder
      responses:
        '200':
          description: The order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [ERP]
      summary: Partially update an order
      operationId: updateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Order' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/orders/{order_id}/confirm:
    parameters: [{ $ref: '#/components/parameters/OrderId' }]
    post:
      tags: [ERP]
      summary: Confirm an order
      operationId: confirmOrder
      responses:
        '200':
          description: Confirmed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/orders/{order_id}/complete:
    parameters: [{ $ref: '#/components/parameters/OrderId' }]
    post:
      tags: [ERP]
      summary: Mark an order complete
      operationId: completeOrder
      responses:
        '200':
          description: Completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/orders/{order_id}/cancel:
    parameters: [{ $ref: '#/components/parameters/OrderId' }]
    post:
      tags: [ERP]
      summary: Cancel an order
      operationId: cancelOrder
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/orders/{order_id}/payments:
    parameters: [{ $ref: '#/components/parameters/OrderId' }]
    get:
      tags: [ERP]
      summary: List payments for an order
      operationId: listOrderPayments
      responses:
        '200':
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Payment' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [ERP]
      summary: Record a payment against an order
      operationId: createOrderPayment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Payment' }
      responses:
        '201':
          description: Recorded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/inventory:
    get:
      tags: [ERP]
      summary: View stock by product/warehouse
      operationId: listInventory
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: product_id
          in: query
          schema: { type: string, format: uuid }
        - name: warehouse_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Stock levels
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryItemPage' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/inventory/adjustments:
    get:
      tags: [ERP]
      summary: List stock adjustments
      operationId: listInventoryAdjustments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Adjustments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryAdjustmentPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [ERP]
      summary: Create a stock adjustment
      operationId: createInventoryAdjustment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryAdjustment' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryAdjustment' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/products:
    get:
      tags: [ERP]
      summary: List products
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: A page of products
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [ERP]
      summary: Create a product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/products/{product_id}:
    parameters: [{ $ref: '#/components/parameters/ProductId' }]
    get:
      tags: [ERP]
      summary: Get a product
      operationId: getProduct
      responses:
        '200':
          description: The product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [ERP]
      summary: Update a product
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [ERP]
      summary: Discontinue or delete a product (per policy)
      operationId: deleteProduct
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/invoices:
    get:
      tags: [ERP]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          description: A page of invoices
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoicePage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [ERP]
      summary: Create or issue an invoice
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Invoice' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/invoices/{invoice_id}:
    parameters: [{ $ref: '#/components/parameters/InvoiceId' }]
    get:
      tags: [ERP]
      summary: Get an invoice
      operationId: getInvoice
      responses:
        '200':
          description: The invoice
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/erp/invoices/{invoice_id}/cancel:
    parameters: [{ $ref: '#/components/parameters/InvoiceId' }]
    post:
      tags: [ERP]
      summary: Cancel an invoice
      operationId: cancelInvoice
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/Error' }

  # ───────────────────────────── CRM ─────────────────────────────
  /api/v1/crm/customers:
    get:
      tags: [CRM]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: segment
          in: query
          schema: { type: string }
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of customers
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [CRM]
      summary: Create a customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Customer' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/crm/customers/{customer_id}:
    parameters: [{ $ref: '#/components/parameters/CustomerId' }]
    get:
      tags: [CRM]
      summary: Get a customer
      operationId: getCustomer
      responses:
        '200':
          description: The customer
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [CRM]
      summary: Update a customer
      operationId: updateCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Customer' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/crm/customers/{customer_id}/timeline:
    parameters: [{ $ref: '#/components/parameters/CustomerId' }]
    get:
      tags: [CRM]
      summary: Customer activity timeline (orders, deals, interactions)
      operationId: getCustomerTimeline
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Timeline entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimelineEntry' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/crm/deals:
    get:
      tags: [CRM]
      summary: List deals by pipeline
      operationId: listDeals
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: stage
          in: query
          schema: { $ref: '#/components/schemas/DealStage' }
      responses:
        '200':
          description: A page of deals
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DealPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [CRM]
      summary: Create a deal
      operationId: createDeal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Deal' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/crm/deals/{deal_id}:
    parameters: [{ $ref: '#/components/parameters/DealId' }]
    get:
      tags: [CRM]
      summary: Get a deal
      operationId: getDeal
      responses:
        '200':
          description: The deal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [CRM]
      summary: Update a deal
      operationId: updateDeal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Deal' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/crm/deals/{deal_id}/move-stage:
    parameters: [{ $ref: '#/components/parameters/DealId' }]
    post:
      tags: [CRM]
      summary: Move a deal to another pipeline stage
      operationId: moveDealStage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage: { $ref: '#/components/schemas/DealStage' }
      responses:
        '200':
          description: Moved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/crm/activities:
    get:
      tags: [CRM]
      summary: List activities (call/email/meeting/task)
      operationId: listActivities
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/ActivityType' }
      responses:
        '200':
          description: A page of activities
          content:
            application/json:
