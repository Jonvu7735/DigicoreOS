  /api/v1/ai/assist:
    post:
      tags: [AI]
      summary: Contextual assistant for a business screen
      operationId: aiAssist
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiAssistRequest' }
      responses:
        '200':
          description: Assistant response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiResponse' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/ai/models:
    get:
      tags: [AI]
      summary: List available models/configs
      operationId: listAiModels
      responses:
        '200':
          description: Models
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AiModel' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/ai/models/reload:
    post:
      tags: [AI]
      summary: Reload model/prompt configuration (admin)
      operationId: reloadAiModels
      responses:
        '202': { description: Reload accepted }
        default: { $ref: '#/components/responses/Error' }

  # ───────────────────── Trade-Export (vertical) ─────────────────────
  /api/v1/trade-export/shipments:
    get:
      tags: [TradeExport]
      summary: List export shipments
      operationId: listShipments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of shipments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [TradeExport]
      summary: Create an export shipment
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Shipment' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Shipment' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/trade-export/shipments/{shipment_id}:
    parameters:
      - name: shipment_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [TradeExport]
      summary: Get an export shipment
      operationId: getShipment
      responses:
        '200':
          description: The shipment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Shipment' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/Error' }
  /api/v1/trade-export/shipments/{shipment_id}/book:
    parameters:
      - name: shipment_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [TradeExport]
      summary: Book a draft shipment (DRAFT→BOOKED, emits ShipmentBooked)
      operationId: bookShipment
      responses:
        '200':
          description: Booked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Shipment' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/Error' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 access token from /api/v1/auth/login, verified per service.

  parameters:
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: false
      description: Tenant id; optional when the JWT already carries the tenant (API-GATEWAY.md §2.2).
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    Search:
      name: q
      in: query
      description: Free-text search.
      schema: { type: string }
    Status:
      name: status
      in: query
      schema: { type: string }
    FromDate:
      name: from_date
      in: query
      schema: { type: string, format: date }
    ToDate:
      name: to_date
      in: query
      schema: { type: string, format: date }
    Granularity:
      name: granularity
      in: query
      schema: { type: string, enum: [day, week, month], default: day }
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantPathId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string }
    OrderId:
      name: order_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProductId:
      name: product_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    InvoiceId:
      name: invoice_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    CustomerId:
      name: customer_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    DealId:
      name: deal_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ActivityId:
      name: activity_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    EmployeeId:
      name: employee_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    LeaveId:
      name: leave_id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Error:
      description: Unexpected error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not permitted (see SECURITY.md RBAC)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Invalid state transition for the resource
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limited at the edge (SECURITY.md §5.2)
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: Machine-readable error code, example: validation_error }
        message: { type: string, description: Human-readable message }
        request_id: { type: string, description: Correlates with server logs/traces }
        details:
          type: array
          description: Optional field-level problems.
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    # ---- Auth ----
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, writeOnly: true }
        tenant_id: { type: string, description: Optional when the email is globally unique }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    TokenPair:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer], default: Bearer }
        expires_in: { type: integer, description: Access-token lifetime in seconds }
    User:
      type: object
      required: [email]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        tenant_id: { type: string, readOnly: true }
        email: { type: string, format: email }
        full_name: { type: string }
        password: { type: string, format: password, writeOnly: true }
        roles:
          type: array
          items: { type: string }
          description: RBAC roles (see SECURITY.md).
        status: { type: string, enum: [active, disabled], readOnly: true }
        created_at: { type: string, format: date-time, readOnly: true }
    UserPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/User' } }
    Tenant:
      type: object
      required: [name]
      properties:
        id: { type: string, readOnly: true }
        name: { type: string }
        plan: { type: string, description: Subscription plan }
        status: { type: string, enum: [active, suspended] }
        created_at: { type: string, format: date-time, readOnly: true }
    TenantPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Tenant' } }

    # ---- ERP ----
    OrderStatus:
      type: string
      enum: [pending, confirmed, completed, cancelled]
    Order:
      type: object
      required: [customer_id]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        tenant_id: { type: string, readOnly: true }
        customer_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/OrderStatus' }
        total_amount: { type: integer, format: int64, description: Total in minor units, readOnly: true }
        currency: { type: string, description: ISO 4217, example: USD }
        note: { type: string }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLine' }
        created_at: { type: string, format: date-time, readOnly: true }
    OrderLine:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        unit_price: { type: integer, format: int64, description: Minor units }
    OrderPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Order' } }
    Payment:
      type: object
      required: [amount, currency]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        order_id: { type: string, format: uuid, readOnly: true }
        amount: { type: integer, format: int64, description: Minor units }
        currency: { type: string, example: USD }
        method: { type: string, description: e.g. cash, card, transfer }
        paid_at: { type: string, format: date-time, readOnly: true }
    Product:
      type: object
      required: [sku, name]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        tenant_id: { type: string, readOnly: true }
        sku: { type: string }
        name: { type: string }
        price: { type: integer, format: int64, description: Minor units }
        currency: { type: string, example: USD }
        category: { type: string }
        created_at: { type: string, format: date-time, readOnly: true }
    ProductPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Product' } }
    InventoryItem:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        warehouse_id: { type: string }
        quantity: { type: integer, format: int64 }
    InventoryItemPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/InventoryItem' } }
    InventoryAdjustment:
      type: object
      required: [product_id, warehouse_id, delta]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        product_id: { type: string, format: uuid }
        warehouse_id: { type: string }
        delta: { type: integer, format: int64, description: Signed quantity change }
        reason: { type: string }
        created_at: { type: string, format: date-time, readOnly: true }
    InventoryAdjustmentPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/InventoryAdjustment' } }
    InvoiceStatus:
      type: string
      enum: [draft, issued, cancelled]
    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        order_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        amount: { type: integer, format: int64, description: Minor units, readOnly: true }
        currency: { type: string, example: USD }
        issued_at: { type: string, format: date-time, readOnly: true }
    InvoicePage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Invoice' } }

    # ---- CRM ----
    Customer:
      type: object
      required: [name]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        tenant_id: { type: string, readOnly: true }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        segment: { type: string }
        owner_id: { type: string, format: uuid, description: Sales owner }
        created_at: { type: string, format: date-time, readOnly: true }
    CustomerPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Customer' } }
    DealStage:
      type: string
      enum: [new, qualified, proposal, won, lost]
    Deal:
      type: object
      required: [title]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        customer_id: { type: string, format: uuid }
        title: { type: string }
        stage: { $ref: '#/components/schemas/DealStage' }
        amount: { type: integer, format: int64, description: Minor units }
        currency: { type: string, example: USD }
        owner_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time, readOnly: true }
    DealPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Deal' } }
    ActivityType:
      type: string
      enum: [call, email, meeting, task]
    Activity:
      type: object
      required: [type]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        type: { $ref: '#/components/schemas/ActivityType' }
        customer_id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid }
        subject: { type: string }
        note: { type: string }
        due_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time, readOnly: true }
    ActivityPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Activity' } }
    TimelineEntry:
      type: object
      properties:
        kind: { type: string, description: e.g. order, deal, activity }
        ref_id: { type: string }
        summary: { type: string }
        occurred_at: { type: string, format: date-time }

    # ---- HRM ----
    Employee:
      type: object
      required: [full_name]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        tenant_id: { type: string, readOnly: true }
        full_name: { type: string }
        email: { type: string, format: email }
        department: { type: string }
        title: { type: string }
        status: { type: string, enum: [active, inactive] }
        hired_at: { type: string, format: date }
        created_at: { type: string, format: date-time, readOnly: true }
    EmployeePage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Employee' } }
    AttendanceType:
      type: string
      enum: [check_in, check_out]
    Attendance:
      type: object
      required: [employee_id, type]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        employee_id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/AttendanceType' }
        at: { type: string, format: date-time }
    AttendancePage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Attendance' } }
    LeaveStatus:
      type: string
      enum: [pending, approved, rejected]
    Leave:
      type: object
      required: [employee_id, from_date, to_date]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        employee_id: { type: string, format: uuid }
        from_date: { type: string, format: date }
        to_date: { type: string, format: date }
        reason: { type: string }
        status: { $ref: '#/components/schemas/LeaveStatus' }
        created_at: { type: string, format: date-time, readOnly: true }
    LeavePage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Leave' } }

    # ---- Reporting ----
    ReportData:
      type: object
      description: |
        Report payload. Shape varies per report; `data` carries the rows/metrics
        and `meta` any pagination or window descriptors.
      properties:
        report: { type: string }
        generated_at: { type: string, format: date-time }
        data:
          description: Report rows or metric object.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: { type: object, additionalProperties: true }
        meta: { type: object, additionalProperties: true }

    # ---- AI ----
    AiQueryRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        context: { type: object, additionalProperties: true, description: Optional screen/business context }
        model: { type: string, description: Optional model override }
    AiInsightRequest:
      type: object
      required: [topic]
      properties:
        topic: { type: string, description: e.g. revenue, at_risk_customers }
        params: { type: object, additionalProperties: true }
    AiAssistRequest:
      type: object
      required: [screen]
      properties:
        screen: { type: string, description: Business screen/context key }
        query: { type: string }
        context: { type: object, additionalProperties: true }
    AiResponse:
      type: object
      properties:
        answer: { type: string }
        data: { type: object, additionalProperties: true, description: Optional structured result }
        citations:
          type: array
          items:
            type: object
            properties:
              source: { type: string }
              ref: { type: string }
        model: { type: string }
    AiModel:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        enabled: { type: boolean }

    # ---- Trade-Export (vertical) ----
    ShipmentStatus:
      type: string
      enum: [DRAFT, BOOKED, DISPATCHED, CANCELLED]
    Shipment:
      type: object
      required: [destination_country, incoterm]
      properties:
        id: { type: string, format: uuid, readOnly: true }
        tenant_id: { type: string, readOnly: true }
        order_id:
          type: [string, "null"]
          description: ERP order this shipment fulfils (null for a manual shipment).
        reference: { type: string, readOnly: true, description: "e.g. EXP-1A2B3C4D" }
        destination_country: { type: string, description: ISO-3166 alpha-2, example: VN }
        incoterm: { type: string, example: FOB }
        status: { $ref: '#/components/schemas/ShipmentStatus' }
        created_at: { type: string, format: date-time, readOnly: true }
    ShipmentPage:
      type: object
      allOf: [{ $ref: '#/components/schemas/PageMeta' }]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Shipment' } }
