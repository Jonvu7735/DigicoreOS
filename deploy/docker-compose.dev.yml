# Local dev stack for DigicoreOS core (DATA-STRATEGY.md):
# - One shared PostgreSQL instance; each service uses its own schema
#   (auth_svc, erp_core_svc, crm_svc, hrm_svc, reporting_svc, ai_svc).
# - NATS with JetStream as the event bus (EVENTS.md).
#
# Default `up` starts ONLY infra (Postgres + NATS) for `cargo run` workflows:
#     docker compose -f deploy/docker-compose.dev.yml up -d
#
# To run the WHOLE platform (6 core + 2 vertical services + the web UI) in
# containers, enable the `services` profile (first generate dev RS256 keys:
# `bash scripts/gen-dev-jwt-keys.sh`):
#     docker compose -f deploy/docker-compose.dev.yml --profile services up -d --build
# then open the UI at http://localhost:8080 (nginx serves the SPA and proxies the
# API to each service). Each service applies its own migrations on boot.

# Reusable anchors (x- fields are ignored by Compose).
x-svc-build: &svc-build
  context: ..
  dockerfile: deploy/Dockerfile

x-svc-env: &svc-env
  APP_ENV: dev
  DATABASE_URL: postgres://digicore:digicore@postgres:5432/digicore
  NATS_URL: nats://nats:4222
  JWT_PUBLIC_KEY_PATH: /keys/jwt_public.pem

x-svc-deps: &svc-deps
  postgres: { condition: service_healthy }
  nats: { condition: service_started }

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: digicore
      POSTGRES_PASSWORD: digicore
      POSTGRES_DB: digicore
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digicore"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js"] # enable JetStream
    ports: ["4222:4222", "8222:8222"]

  # --- platform services (profile: services) --------------------------------
  # auth-svc also SIGNS tokens, so it additionally gets the private key.
  auth-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args: { SERVICE: auth-svc }
    depends_on: *svc-deps
    environment:
      <<: *svc-env
      JWT_PRIVATE_KEY_PATH: /keys/jwt_private.pem
    volumes: ["../.dev:/keys:ro"]
    ports: ["8081:8081"]

  core-erp-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args: { SERVICE: core-erp-svc }
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8082:8082"]

  crm-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args: { SERVICE: crm-svc }
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8083:8083"]

  hrm-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args: { SERVICE: hrm-svc }
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8084:8084"]

  reporting-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args: { SERVICE: reporting-svc }
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8085:8085"]

  ai-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args: { SERVICE: ai-svc }
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8086:8086"]

  # --- vertical services (their OWN Cargo workspaces; built via MANIFEST_PATH) ---
  trade-export-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args:
        SERVICE: trade-export-svc
        MANIFEST_PATH: verticals/trade-export-svc/Cargo.toml
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8087:8087"]

  retail-svc:
    profiles: ["services"]
    build:
      <<: *svc-build
      args:
        SERVICE: retail-svc
        MANIFEST_PATH: verticals/retail-svc/Cargo.toml
    depends_on: *svc-deps
    environment: *svc-env
    volumes: ["../.dev:/keys:ro"]
    ports: ["8088:8088"]

  # --- web UI + API reverse proxy ---
  # nginx serves the built SPA AND proxies /api/v1/<service> to each service, so
  # the browser talks to ONE origin (http://localhost:8080) — no CORS, no gateway.
  web:
    profiles: ["services"]
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on: [auth-svc]
    ports: ["8080:80"]

volumes:
  pgdata: {}
