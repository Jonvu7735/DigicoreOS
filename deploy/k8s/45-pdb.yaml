# PodDisruptionBudgets: keep at least one pod of every service running through
# voluntary disruptions (node drains, cluster upgrades). With replicas: 2 this
# guarantees zero-downtime maintenance. (NATS has its own quorum PDB in 30-nats.yaml.)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-svc
  namespace: digicore
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: auth-svc }
---
