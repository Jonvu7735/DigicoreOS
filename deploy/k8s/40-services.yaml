# The six platform services. Images are built from deploy/Dockerfile
# (`--build-arg SERVICE=<name>`) and pushed to your registry; replace the
# `digicore/<svc>:latest` placeholders accordingly.
#
# Every service reads shared config from the `digicore-config` ConfigMap and
# mounts the RS256 public key from the `digicore-jwt` secret at /keys. auth-svc
# additionally mounts the private key to sign tokens.

# ----------------------------------------------------------------------------
# auth-svc (:8081, /api/v1/auth) — issues tokens, so it needs the private key.
# ----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-svc
  namespace: digicore
  labels: { app: auth-svc }
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-svc }
  template:
    metadata:
      labels: { app: auth-svc }
    spec:
      containers:
        - name: auth-svc
          image: digicore/auth-svc:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: digicore-config
          env:
            - name: JWT_PRIVATE_KEY_PATH
              value: /keys/jwt_private.pem
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            httpGet: { path: /api/v1/auth/ready, port: 8081 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/auth/health, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: jwt-keys
          secret:
            secretName: digicore-jwt
---
apiVersion: v1
kind: Service
metadata:
  name: auth-svc
  namespace: digicore
spec:
  selector: { app: auth-svc }
  ports:
    - port: 8081
      targetPort: 8081
---
