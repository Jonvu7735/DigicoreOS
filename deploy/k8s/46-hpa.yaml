# Horizontal Pod Autoscalers: scale each stateless service on CPU between 2 and
# 5 replicas. Requires metrics-server in the cluster. Tune targets after load
# testing (the review flags capacity planning as a pre-GA task).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-svc
  namespace: digicore
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: auth-svc }
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
