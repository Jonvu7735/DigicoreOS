# ---------------------------------------------------------------------------
# API edge (API-GATEWAY.md): one HTTPS host that fronts the ClusterIP services
# and exposes the public /api/v1/<domain>/ surface, with per-IP rate limiting at
# the edge (SECURITY.md §5). Services preserve the full request path, so NO URL
# rewrite is needed — /api/v1/auth/login reaches auth-svc unchanged. JWT is still
# verified per-service (platform-auth AuthContext); the edge adds TLS + throttling.
#
# Controller: assumes ingress-nginx (uses its rate-limit annotations). For a
# different controller, translate the nginx.ingress.kubernetes.io/* annotations.
#
# Host & TLS: replace `api.digicore.example.com` with your domain. TLS uses the
# `digicore-tls` secret — provision with cert-manager (uncomment the issuer
# annotation) or create it out of band, like digicore-jwt (see README §5):
#   kubectl -n digicore create secret tls digicore-tls --cert=tls.crt --key=tls.key
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digicore-api
  namespace: digicore
  annotations:
    # All client traffic is HTTPS (SECURITY.md §5.1).
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Per-client-IP rate limit for the general surface: limit-rps is the steady
    # rate; bursts up to limit-rps * burst-multiplier are queued before 429/503.
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Cap request bodies; raise per-route if AI payloads need more.
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.digicore.example.com]
      secretName: digicore-tls
  rules:
    - host: api.digicore.example.com
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend: { service: { name: auth-svc, port: { number: 8081 } } }
          - path: /api/v1/erp
            pathType: Prefix
            backend: { service: { name: core-erp-svc, port: { number: 8082 } } }
          - path: /api/v1/crm
            pathType: Prefix
            backend: { service: { name: crm-svc, port: { number: 8083 } } }
          - path: /api/v1/hrm
            pathType: Prefix
            backend: { service: { name: hrm-svc, port: { number: 8084 } } }
          - path: /api/v1/reporting
            pathType: Prefix
            backend: { service: { name: reporting-svc, port: { number: 8085 } } }
          - path: /api/v1/ai
            pathType: Prefix
            backend: { service: { name: ai-svc, port: { number: 8086 } } }
---
# Sensitive auth endpoints get a much tighter per-IP limit to blunt credential
# stuffing / brute force — SECURITY.md §5.2 calls /auth/login and /auth/refresh
# out specifically. These are Exact paths, so nginx matches them before the
# /api/v1/auth Prefix above: login/refresh use the strict limit here, while the
# rest of /api/v1/auth keeps the general one.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digicore-api-auth-sensitive
  namespace: digicore
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rpm: "20"
    nginx.ingress.kubernetes.io/limit-connections: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.digicore.example.com]
      secretName: digicore-tls
  rules:
    - host: api.digicore.example.com
      http:
        paths:
          - path: /api/v1/auth/login
            pathType: Exact
            backend: { service: { name: auth-svc, port: { number: 8081 } } }
          - path: /api/v1/auth/refresh
            pathType: Exact
            backend: { service: { name: auth-svc, port: { number: 8081 } } }
