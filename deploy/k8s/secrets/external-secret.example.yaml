# EXAMPLE External Secrets Operator config. Syncs secrets from an external
# manager (here: HashiCorp Vault — swap the provider for AWS/GCP as needed) into
# the k8s Secrets the platform consumes. Install the operator first
# (https://external-secrets.io). Replace server/path/keys with your own.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: digicore-vault
  namespace: digicore
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "digicore"
          serviceAccountRef:
            name: default
---
# Postgres credentials -> Secret `digicore-postgres`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: digicore-postgres
  namespace: digicore
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: digicore-vault
    kind: SecretStore
  target:
    name: digicore-postgres
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef: { key: digicore/postgres, property: username }
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: digicore/postgres, property: password }
    - secretKey: POSTGRES_DB
      remoteRef: { key: digicore/postgres, property: database }
---
# RS256 JWT keypair -> Secret `digicore-jwt` (mounted at /keys by the services).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: digicore-jwt
  namespace: digicore
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: digicore-vault
    kind: SecretStore
  target:
    name: digicore-jwt
    creationPolicy: Owner
  data:
    - secretKey: jwt_public.pem
      remoteRef: { key: digicore/jwt, property: public_pem }
    - secretKey: jwt_private.pem
      remoteRef: { key: digicore/jwt, property: private_pem }
