# EXAMPLE Sealed Secret (Bitnami sealed-secrets). The `encryptedData` values are
# placeholders — generate real ones with `kubeseal` (see README.md). The
# controller decrypts this into a normal Secret named `digicore-postgres`.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: digicore-postgres
  namespace: digicore
spec:
  encryptedData:
    POSTGRES_USER: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...
    POSTGRES_PASSWORD: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...
    POSTGRES_DB: AgB...REPLACE_WITH_KUBESEAL_OUTPUT...
  template:
    metadata:
      name: digicore-postgres
      namespace: digicore
    type: Opaque
