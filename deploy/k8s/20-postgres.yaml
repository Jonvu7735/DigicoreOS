# Single shared Postgres (one schema per service; DATA-STRATEGY.md). For
# production prefer a managed/HA database and drop this manifest.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: digicore-pgdata
  namespace: digicore
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: digicore
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: digicore-postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "digicore"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: digicore-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: digicore
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
