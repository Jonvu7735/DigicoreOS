# Alerting rules for the DigicoreOS platform (OBSERVABILITY.md §7.2), grounded in
# the metrics the services actually emit + `up` from scraping.
#
# This is a Prometheus Operator `PrometheusRule`. For vanilla Prometheus, copy the
# `spec.groups` below into a file referenced by `rule_files`. The `release` label
# must match your operator's `ruleSelector` (kube-prometheus-stack defaults shown).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: digicore-alerts
  namespace: digicore
  labels:
    app.kubernetes.io/part-of: digicore-observability
    release: kube-prometheus-stack
spec:
  groups:
    - name: digicore.availability
      rules:
        - alert: DigicoreServiceDown
          expr: up{service=~"auth-svc|core-erp-svc|crm-svc|hrm-svc|reporting-svc|ai-svc|trade-export-svc|retail-svc"} == 0
          for: 2m
          labels: { severity: critical }
          annotations:
            summary: "{{ $labels.service }} is down"
            description: "Prometheus has not scraped {{ $labels.service }} for 2m (up == 0)."
    - name: digicore.auth
      rules:
        # Sustained login failures — possible credential stuffing / brute force
        # (SECURITY.md §5.2 calls out protecting /auth/login).
        - alert: DigicoreHighLoginFailureRate
          expr: sum(rate(auth_login_failed_total[5m])) > 1
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Elevated auth login-failure rate"
            description: "auth_login_failed_total is averaging >1/s over 5m — investigate for brute force."
        - alert: DigicoreHighRefreshFailureRate
          expr: sum(rate(auth_refresh_failed_total[5m])) > 1
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Elevated auth token-refresh failure rate"
            description: "auth_refresh_failed_total is averaging >1/s over 5m."
    - name: digicore.events
      rules:
        # events_consumed_failed_total now increments only when a message is
        # dead-lettered (parked on the platform_dlq stream after MAX_DELIVER
        # retries) — i.e. a poison event that needs human attention. Transient
        # handler errors are retried via NAK and do NOT trip this.
        - alert: DigicoreEventDeadLettered
          expr: sum(increase(events_consumed_failed_total[10m])) > 0
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: "Events are being dead-lettered"
            description: "events_consumed_failed_total rose in the last 10m — one or more events exhausted retries and were parked on platform_dlq. Inspect the DLQ and the handler logs."
    - name: digicore.http
      rules:
        - alert: DigicoreHighHttpErrorRate
          expr: sum by (service) (rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum by (service) (rate(http_requests_total[5m])), 1) > 0.05
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "{{ $labels.service }} 5xx error rate >5%"
            description: "More than 5% of {{ $labels.service }} responses are 5xx over 10m."
        - alert: DigicoreHighHttpLatencyP95
          expr: histogram_quantile(0.95, sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "{{ $labels.service }} p95 latency >1s"
            description: "{{ $labels.service }} p95 request latency exceeds 1s over 10m."
