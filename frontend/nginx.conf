# Serve the SPA and reverse-proxy /api/v1/<service> to each service container —
# mirrors the dev Vite proxy (vite.config.ts) for the containerized demo, so the
# browser hits ONE origin (no CORS, no separate API gateway).
server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. Resolving upstreams at request time (not config
    # load) means nginx starts even if a service isn't up yet, and survives a
    # service restart changing its IP — it just 502s until that service is ready.
    resolver 127.0.0.11 ipv6=off valid=10s;

    location /api/v1/auth         { set $u http://auth-svc:8081;         proxy_pass $u$request_uri; }
    location /api/v1/erp          { set $u http://core-erp-svc:8082;     proxy_pass $u$request_uri; }
    location /api/v1/crm          { set $u http://crm-svc:8083;          proxy_pass $u$request_uri; }
    location /api/v1/hrm          { set $u http://hrm-svc:8084;          proxy_pass $u$request_uri; }
    location /api/v1/reporting    { set $u http://reporting-svc:8085;    proxy_pass $u$request_uri; }
    location /api/v1/ai           { set $u http://ai-svc:8086;           proxy_pass $u$request_uri; }
    location /api/v1/trade-export { set $u http://trade-export-svc:8087; proxy_pass $u$request_uri; }
    location /api/v1/retail       { set $u http://retail-svc:8088;       proxy_pass $u$request_uri; }

    # SPA: fall back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
